<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDoS Attack Detection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #8892b0;
            font-size: 1.1rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card h2 {
            margin-bottom: 20px;
            color: #00d2ff;
            font-size: 1.3rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            color: #8892b0;
            font-size: 0.9rem;
        }

        input[type="number"] {
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #00d2ff;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
        }

        input[type="number"]::placeholder {
            color: #4a5568;
        }

        .protocol-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .protocol-group {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .protocol-option {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .protocol-option input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .btn-container {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: center;
        }

        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 210, 255, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .result-card {
            display: none;
        }

        .result-card.show {
            display: block;
        }

        .result-content {
            text-align: center;
            padding: 20px;
        }

        .result-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .result-label {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .result-confidence {
            color: #8892b0;
            font-size: 1.1rem;
        }

        .result-normal {
            color: #00ff88;
        }

        .result-attack {
            color: #ff4757;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #00d2ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-message {
            display: none;
            background: rgba(255, 71, 87, 0.2);
            border: 1px solid #ff4757;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            color: #ff4757;
        }

        .error-message.show {
            display: block;
        }

        .quick-fill {
            margin-top: 20px;
            text-align: center;
        }

        .quick-fill-btn {
            padding: 8px 16px;
            margin: 5px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #8892b0;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .quick-fill-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            color: #8892b0;
            font-size: 0.9rem;
        }

        footer a {
            color: #00d2ff;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛡️ DDoS Attack Detection</h1>
            <p class="subtitle">Machine Learning-powered Network Traffic Analysis</p>
        </header>

        <div class="card">
            <h2>📊 Network Traffic Features</h2>
            <form id="predictionForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="pktcount">Packet Count</label>
                        <input type="number" id="pktcount" name="pktcount" value="0" step="any">
                    </div>
                    <div class="form-group">
                        <label for="bytecount">Byte Count</label>
                        <input type="number" id="bytecount" name="bytecount" value="0" step="any">
                    </div>
                    <div class="form-group">
                        <label for="dur">Duration (sec)</label>
                        <input type="number" id="dur" name="dur" value="0" step="any">
                    </div>
                    <div class="form-group">
                        <label for="dur_nsec">Duration (nsec)</label>
                        <input type="number" id="dur_nsec" name="dur_nsec" value="0" step="any">
                    </div>
                    <div class="form-group">
                        <label for="tot_dur">Total Duration</label>
                        <input type="number" id="tot_dur" name="tot_dur" value="0" step="any">
                    </div>
                    <div class="form-group">
                        <label for="flows">Flows</label>
                        <input type="number" id="flows" name="flows" value="0" step="any">
                    </div>
                    <div class="form-group">
                        <label for="packetins">Packet-ins</label>
                        <input type="number" id="packetins" name="packetins" value="0" step="any">
                    </div>
                    <div class="form-group">
                        <label for="pktperflow">Packets per Flow</label>
                        <input type="number" id="pktperflow" name="pktperflow" value="0" step="any">
                    </div>
                    <div class="form-group">
                        <label for="byteperflow">Bytes per Flow</label>
                        <input type="number" id="byteperflow" name="byteperflow" value="0" step="any">
                    </div>
                    <div class="form-group">
                        <label for="pktrate">Packet Rate</label>
                        <input type="number" id="pktrate" name="pktrate" value="0" step="any">
                    </div>
                    <div class="form-group">
                        <label for="Pairflow">Pair Flow</label>
                        <input type="number" id="Pairflow" name="Pairflow" value="0" step="any">
                    </div>
                    <div class="form-group">
                        <label for="port_no">Port Number</label>
                        <input type="number" id="port_no" name="port_no" value="0" step="any">
                    </div>
                    <div class="form-group">
                        <label for="tx_bytes">TX Bytes</label>
                        <input type="number" id="tx_bytes" name="tx_bytes" value="0" step="any">
                    </div>
                    <div class="form-group">
                        <label for="rx_bytes">RX Bytes</label>
                        <input type="number" id="rx_bytes" name="rx_bytes" value="0" step="any">
                    </div>
                    <div class="form-group">
                        <label for="tx_kbps">TX Kbps</label>
                        <input type="number" id="tx_kbps" name="tx_kbps" value="0" step="any">
                    </div>
                    <div class="form-group">
                        <label for="rx_kbps">RX Kbps</label>
                        <input type="number" id="rx_kbps" name="rx_kbps" value="0" step="any">
                    </div>
                    <div class="form-group">
                        <label for="tot_kbps">Total Kbps</label>
                        <input type="number" id="tot_kbps" name="tot_kbps" value="0" step="any">
                    </div>
                </div>

                <div class="protocol-section">
                    <h2>🔌 Protocol</h2>
                    <div class="protocol-group">
                        <label class="protocol-option">
                            <input type="checkbox" id="Protocol_ICMP" name="Protocol_ICMP">
                            ICMP
                        </label>
                        <label class="protocol-option">
                            <input type="checkbox" id="Protocol_TCP" name="Protocol_TCP">
                            TCP
                        </label>
                        <label class="protocol-option">
                            <input type="checkbox" id="Protocol_UDP" name="Protocol_UDP">
                            UDP
                        </label>
                    </div>
                </div>

                <div class="quick-fill">
                    <span style="color: #8892b0; margin-right: 10px;">Quick Fill:</span>
                    <button type="button" class="quick-fill-btn" onclick="fillNormalTraffic()">Normal Traffic Sample</button>
                    <button type="button" class="quick-fill-btn" onclick="fillAttackTraffic()">DDoS Attack Sample</button>
                </div>

                <div class="btn-container">
                    <button type="submit" class="btn btn-primary">🔍 Analyze Traffic</button>
                    <button type="button" class="btn btn-secondary" onclick="resetForm()">🔄 Reset</button>
                </div>
            </form>

            <div class="error-message" id="errorMessage"></div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing network traffic...</p>
        </div>

        <div class="card result-card" id="resultCard">
            <h2>📋 Analysis Result</h2>
            <div class="result-content">
                <div class="result-icon" id="resultIcon"></div>
                <div class="result-label" id="resultLabel"></div>
                <div class="result-confidence" id="resultConfidence"></div>
            </div>
        </div>

        <footer>
            <p>Built with ❤️ using <a href="https://fastapi.tiangolo.com/" target="_blank" rel="noopener noreferrer">FastAPI</a> & Machine Learning</p>
            <p>Model: Logistic Regression for DDoS Attack Detection</p>
        </footer>
    </div>

    <script>
        const form = document.getElementById('predictionForm');
        const loading = document.getElementById('loading');
        const resultCard = document.getElementById('resultCard');
        const errorMessage = document.getElementById('errorMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Hide previous results and errors
            resultCard.classList.remove('show');
            errorMessage.classList.remove('show');

            // Show loading
            loading.classList.add('show');

            // Gather form data
            const formData = {
                pktcount: parseFloat(document.getElementById('pktcount').value) || 0,
                bytecount: parseFloat(document.getElementById('bytecount').value) || 0,
                dur: parseFloat(document.getElementById('dur').value) || 0,
                dur_nsec: parseFloat(document.getElementById('dur_nsec').value) || 0,
                tot_dur: parseFloat(document.getElementById('tot_dur').value) || 0,
                flows: parseFloat(document.getElementById('flows').value) || 0,
                packetins: parseFloat(document.getElementById('packetins').value) || 0,
                pktperflow: parseFloat(document.getElementById('pktperflow').value) || 0,
                byteperflow: parseFloat(document.getElementById('byteperflow').value) || 0,
                pktrate: parseFloat(document.getElementById('pktrate').value) || 0,
                Pairflow: parseFloat(document.getElementById('Pairflow').value) || 0,
                port_no: parseFloat(document.getElementById('port_no').value) || 0,
                tx_bytes: parseFloat(document.getElementById('tx_bytes').value) || 0,
                rx_bytes: parseFloat(document.getElementById('rx_bytes').value) || 0,
                tx_kbps: parseFloat(document.getElementById('tx_kbps').value) || 0,
                rx_kbps: parseFloat(document.getElementById('rx_kbps').value) || 0,
                tot_kbps: parseFloat(document.getElementById('tot_kbps').value) || 0,
                Protocol_ICMP: document.getElementById('Protocol_ICMP').checked ? 1 : 0,
                Protocol_TCP: document.getElementById('Protocol_TCP').checked ? 1 : 0,
                Protocol_UDP: document.getElementById('Protocol_UDP').checked ? 1 : 0
            };

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || 'Prediction failed');
                }

                const result = await response.json();

                // Hide loading
                loading.classList.remove('show');

                // Display result
                const resultIcon = document.getElementById('resultIcon');
                const resultLabel = document.getElementById('resultLabel');
                const resultConfidence = document.getElementById('resultConfidence');

                if (result.prediction === 0) {
                    resultIcon.textContent = '✅';
                    resultLabel.textContent = result.label;
                    resultLabel.className = 'result-label result-normal';
                } else {
                    resultIcon.textContent = '🚨';
                    resultLabel.textContent = result.label;
                    resultLabel.className = 'result-label result-attack';
                }

                resultConfidence.textContent = `Confidence: ${result.confidence}`;
                resultCard.classList.add('show');

            } catch (error) {
                loading.classList.remove('show');
                errorMessage.textContent = `Error: ${error.message}`;
                errorMessage.classList.add('show');
            }
        });

        function resetForm() {
            form.reset();
            resultCard.classList.remove('show');
            errorMessage.classList.remove('show');
        }

        function fillNormalTraffic() {
            document.getElementById('pktcount').value = 34;
            document.getElementById('bytecount').value = 1200;
            document.getElementById('dur').value = 30;
            document.getElementById('dur_nsec').value = 0;
            document.getElementById('tot_dur').value = 30;
            document.getElementById('flows').value = 5;
            document.getElementById('packetins').value = 5;
            document.getElementById('pktperflow').value = 6.8;
            document.getElementById('byteperflow').value = 240;
            document.getElementById('pktrate').value = 1.13;
            document.getElementById('Pairflow').value = 2;
            document.getElementById('port_no').value = 80;
            document.getElementById('tx_bytes').value = 600;
            document.getElementById('rx_bytes').value = 600;
            document.getElementById('tx_kbps').value = 0.16;
            document.getElementById('rx_kbps').value = 0.16;
            document.getElementById('tot_kbps').value = 0.32;
            document.getElementById('Protocol_ICMP').checked = false;
            document.getElementById('Protocol_TCP').checked = true;
            document.getElementById('Protocol_UDP').checked = false;
        }

        function fillAttackTraffic() {
            document.getElementById('pktcount').value = 50000;
            document.getElementById('bytecount').value = 5000000;
            document.getElementById('dur').value = 1;
            document.getElementById('dur_nsec').value = 0;
            document.getElementById('tot_dur').value = 1;
            document.getElementById('flows').value = 500;
            document.getElementById('packetins').value = 1000;
            document.getElementById('pktperflow').value = 100;
            document.getElementById('byteperflow').value = 10000;
            document.getElementById('pktrate').value = 50000;
            document.getElementById('Pairflow').value = 100;
            document.getElementById('port_no').value = 80;
            document.getElementById('tx_bytes').value = 2500000;
            document.getElementById('rx_bytes').value = 2500000;
            document.getElementById('tx_kbps').value = 20000;
            document.getElementById('rx_kbps').value = 20000;
            document.getElementById('tot_kbps').value = 40000;
            document.getElementById('Protocol_ICMP').checked = false;
            document.getElementById('Protocol_TCP').checked = false;
            document.getElementById('Protocol_UDP').checked = true;
        }
    </script>
</body>
</html>
