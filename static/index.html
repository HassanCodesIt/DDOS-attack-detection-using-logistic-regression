<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DDoS Attack Detection</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 2rem;
      color: #58a6ff;
      letter-spacing: 1px;
    }

    header p {
      margin-top: .5rem;
      color: #8b949e;
      font-size: .95rem;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 820px;
    }

    .card h2 {
      font-size: 1.1rem;
      color: #58a6ff;
      margin-bottom: 1.25rem;
      border-bottom: 1px solid #30363d;
      padding-bottom: .6rem;
    }

    /* ── grid of inputs ─────────────────────────── */
    .fields {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .field label {
      display: block;
      font-size: .8rem;
      color: #8b949e;
      margin-bottom: .35rem;
    }

    .field input {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: .45rem .7rem;
      color: #c9d1d9;
      font-size: .9rem;
      transition: border-color .2s;
    }

    .field input:focus {
      outline: none;
      border-color: #58a6ff;
    }

    /* ── protocol radio ─────────────────────────── */
    .protocol-group {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .protocol-group label {
      display: flex;
      align-items: center;
      gap: .4rem;
      cursor: pointer;
      font-size: .9rem;
      color: #c9d1d9;
    }

    .protocol-group input[type="radio"] {
      accent-color: #58a6ff;
      width: 16px;
      height: 16px;
    }

    /* ── buttons ────────────────────────────────── */
    .actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    button {
      padding: .55rem 1.4rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: .95rem;
      font-weight: 600;
      transition: opacity .2s, transform .1s;
    }

    button:active { transform: scale(.97); }

    #btn-predict {
      background: #238636;
      color: #fff;
    }

    #btn-predict:hover { opacity: .88; }

    #btn-sample-ddos {
      background: #da3633;
      color: #fff;
    }

    #btn-sample-ddos:hover { opacity: .88; }

    #btn-sample-normal {
      background: #1f6feb;
      color: #fff;
    }

    #btn-sample-normal:hover { opacity: .88; }

    #btn-clear {
      background: #30363d;
      color: #c9d1d9;
      border: 1px solid #484f58;
    }

    #btn-clear:hover { opacity: .88; }

    /* ── result box ─────────────────────────────── */
    #result {
      display: none;
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      border: 1px solid transparent;
      animation: fadeIn .3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; } }

    #result.normal {
      background: rgba(35, 134, 54, .15);
      border-color: #238636;
    }

    #result.attack {
      background: rgba(218, 54, 51, .15);
      border-color: #da3633;
    }

    #result .verdict {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: .5rem;
    }

    #result.normal .verdict { color: #3fb950; }
    #result.attack .verdict { color: #f85149; }

    #result .detail {
      font-size: .88rem;
      color: #8b949e;
      line-height: 1.6;
    }

    /* ── probability bar ────────────────────────── */
    .prob-bar-wrap {
      margin-top: .9rem;
    }

    .prob-bar-wrap p {
      font-size: .8rem;
      margin-bottom: .3rem;
      color: #8b949e;
    }

    .prob-bar {
      height: 8px;
      border-radius: 4px;
      background: #30363d;
      overflow: hidden;
      margin-bottom: .4rem;
    }

    .prob-bar .fill {
      height: 100%;
      border-radius: 4px;
      transition: width .5s ease;
    }

    .fill.normal { background: #3fb950; }
    .fill.attack { background: #f85149; }

    /* ── loader ─────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 3px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: .5rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #error-msg {
      display: none;
      color: #f85149;
      font-size: .85rem;
      margin-top: .75rem;
    }

    footer {
      margin-top: 2rem;
      color: #484f58;
      font-size: .8rem;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <h1>🛡️ DDoS Attack Detection</h1>
  <p>Enter network-traffic metrics below and click <strong>Predict</strong> to classify the traffic.</p>
</header>

<main class="card">
  <h2>Traffic Metrics</h2>

  <div class="fields" id="fields">
    <!-- dynamically generated -->
  </div>

  <h2 style="margin-top:1.5rem">Protocol</h2>
  <div class="protocol-group" style="margin-bottom:1.5rem; margin-top:.75rem">
    <label><input type="radio" name="protocol" value="other" checked /> Other / ARP (baseline)</label>
    <label><input type="radio" name="protocol" value="icmp" /> ICMP</label>
    <label><input type="radio" name="protocol" value="tcp"  /> TCP</label>
    <label><input type="radio" name="protocol" value="udp"  /> UDP</label>
  </div>

  <div class="actions">
    <button id="btn-predict">Predict</button>
    <button id="btn-sample-ddos">Load DDoS Sample</button>
    <button id="btn-sample-normal">Load Normal Sample</button>
    <button id="btn-clear">Clear</button>
  </div>

  <div id="result">
    <div class="verdict" id="verdict"></div>
    <div class="detail" id="detail"></div>
    <div class="prob-bar-wrap">
      <p>Normal Traffic probability</p>
      <div class="prob-bar"><div class="fill normal" id="bar-normal" style="width:0%"></div></div>
      <p>DDoS Attack probability</p>
      <div class="prob-bar"><div class="fill attack" id="bar-attack" style="width:0%"></div></div>
    </div>
  </div>

  <div id="error-msg"></div>
</main>

<footer>Powered by FastAPI · Logistic Regression · SDN Dataset</footer>

<script>
  // ──────────────────────────────────────────────────────────────
  // Field definitions  (label, input-id, default value, description)
  // ──────────────────────────────────────────────────────────────
  const FIELDS = [
    { id: "switch",      label: "Switch ID",            def: 1,    hint: "Network switch identifier" },
    { id: "src",         label: "Source (numeric)",     def: 0,    hint: "Source node encoded as number" },
    { id: "dst",         label: "Destination (numeric)",def: 0,    hint: "Destination node encoded as number" },
    { id: "pktcount",    label: "Packet Count",         def: 0,    hint: "Total packets in flow" },
    { id: "bytecount",   label: "Byte Count",           def: 0,    hint: "Total bytes in flow" },
    { id: "dur",         label: "Duration (s)",         def: 0,    hint: "Flow duration in seconds" },
    { id: "dur_nsec",    label: "Duration (ns)",        def: 0,    hint: "Duration nanosecond fraction" },
    { id: "tot_dur",     label: "Total Duration",       def: 0,    hint: "Cumulative flow duration" },
    { id: "flows",       label: "Flows",                def: 0,    hint: "Number of active flows" },
    { id: "packetins",   label: "Packet-Ins",           def: 0,    hint: "Packet-in messages to controller" },
    { id: "pktperflow",  label: "Pkts / Flow",          def: 0,    hint: "Average packets per flow" },
    { id: "byteperflow", label: "Bytes / Flow",         def: 0,    hint: "Average bytes per flow" },
    { id: "pktrate",     label: "Packet Rate",          def: 0,    hint: "Packets per second" },
    { id: "Pkt_Rx",      label: "Pkt Rx",               def: 0,    hint: "Packets received" },
    { id: "Pkt_Tx",      label: "Pkt Tx",               def: 0,    hint: "Packets transmitted" },
    { id: "Pkt_drp_Rx",  label: "Pkt Drop Rx",         def: 0,    hint: "Receive-side drops" },
    { id: "Pkt_drp_Tx",  label: "Pkt Drop Tx",         def: 0,    hint: "Transmit-side drops" },
    { id: "Pkt_err",     label: "Packet Errors",        def: 0,    hint: "Total packet errors" },
    { id: "Bytes_Rx",    label: "Bytes Rx",             def: 0,    hint: "Bytes received" },
    { id: "Bytes_Tx",    label: "Bytes Tx",             def: 0,    hint: "Bytes transmitted" },
    { id: "Pkts_Rx_Drp", label: "Pkts Rx Dropped",     def: 0,    hint: "Received packets dropped" },
    { id: "Bytes_Rx_Drp",label: "Bytes Rx Dropped",    def: 0,    hint: "Received bytes dropped" },
    { id: "tot_kbps",    label: "Total (kbps)",         def: 0,    hint: "Total throughput in kbps" },
    { id: "pktloss",     label: "Packet Loss",          def: 0,    hint: "Fraction of packets lost" },
    { id: "tx_kbps",     label: "TX (kbps)",            def: 0,    hint: "Transmit throughput in kbps" },
    { id: "rx_kbps",     label: "RX (kbps)",            def: 0,    hint: "Receive throughput in kbps" },
    { id: "port_no",     label: "Port No.",             def: 0,    hint: "Switch port number" },
  ];

  // Build the grid of input fields
  const grid = document.getElementById("fields");
  FIELDS.forEach(f => {
    const div = document.createElement("div");
    div.className = "field";
    div.innerHTML = `
      <label for="${f.id}" title="${f.hint}">${f.label}</label>
      <input type="number" step="any" id="${f.id}" value="${f.def}" title="${f.hint}" />
    `;
    grid.appendChild(div);
  });

  // ──────────────────────────────────────────────────────────────
  // Helpers
  // ──────────────────────────────────────────────────────────────
  function setFields(values, protocol) {
    FIELDS.forEach(f => {
      const el = document.getElementById(f.id);
      if (el && values[f.id] !== undefined) el.value = values[f.id];
    });
    document.querySelectorAll('input[name="protocol"]').forEach(r => {
      r.checked = r.value === protocol;
    });
  }

  function clearFields() {
    FIELDS.forEach(f => { document.getElementById(f.id).value = f.def; });
    document.querySelector('input[name="protocol"][value="other"]').checked = true;
    hideResult();
  }

  function hideResult() {
    document.getElementById("result").style.display = "none";
    document.getElementById("error-msg").style.display = "none";
  }

  function showError(msg) {
    const el = document.getElementById("error-msg");
    el.textContent = msg;
    el.style.display = "block";
    document.getElementById("result").style.display = "none";
  }

  function buildPayload() {
    const payload = {};
    FIELDS.forEach(f => {
      payload[f.id] = parseFloat(document.getElementById(f.id).value) || 0;
    });
    const proto = document.querySelector('input[name="protocol"]:checked').value;
    payload.Protocol_ICMP = proto === "icmp" ? 1 : 0;
    payload.Protocol_TCP  = proto === "tcp"  ? 1 : 0;
    payload.Protocol_UDP  = proto === "udp"  ? 1 : 0;
    return payload;
  }

  // ──────────────────────────────────────────────────────────────
  // Sample data
  // ──────────────────────────────────────────────────────────────
  const SAMPLE_DDOS = {
    switch: 1, src: 5, dst: 2,
    pktcount: 5000, bytecount: 4000000,
    dur: 2, dur_nsec: 100000000, tot_dur: 2000,
    flows: 300, packetins: 250,
    pktperflow: 16, byteperflow: 13000,
    pktrate: 2500,
    Pkt_Rx: 4800, Pkt_Tx: 4900,
    Pkt_drp_Rx: 50, Pkt_drp_Tx: 40,
    Pkt_err: 10,
    Bytes_Rx: 3800000, Bytes_Tx: 3900000,
    Pkts_Rx_Drp: 45, Bytes_Rx_Drp: 36000,
    tot_kbps: 16000, pktloss: 0.01,
    tx_kbps: 8000, rx_kbps: 8000,
    port_no: 1,
  };

  const SAMPLE_NORMAL = {
    switch: 1, src: 1, dst: 3,
    pktcount: 34, bytecount: 1200,
    dur: 30, dur_nsec: 0, tot_dur: 30000,
    flows: 5, packetins: 3,
    pktperflow: 6, byteperflow: 240,
    pktrate: 1.1,
    Pkt_Rx: 30, Pkt_Tx: 32,
    Pkt_drp_Rx: 0, Pkt_drp_Tx: 0,
    Pkt_err: 0,
    Bytes_Rx: 1100, Bytes_Tx: 1150,
    Pkts_Rx_Drp: 0, Bytes_Rx_Drp: 0,
    tot_kbps: 0.32, pktloss: 0,
    tx_kbps: 0.16, rx_kbps: 0.16,
    port_no: 80,
  };

  // ──────────────────────────────────────────────────────────────
  // Prediction
  // ──────────────────────────────────────────────────────────────
  async function predict() {
    hideResult();
    const btn = document.getElementById("btn-predict");
    btn.innerHTML = '<span class="spinner"></span>Predicting…';
    btn.disabled = true;

    try {
      const res = await fetch("/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(buildPayload()),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        throw new Error(err.detail || res.statusText);
      }

      const data = await res.json();
      displayResult(data);
    } catch (e) {
      showError("❌ Prediction failed: " + e.message);
    } finally {
      btn.innerHTML = "Predict";
      btn.disabled = false;
    }
  }

  function displayResult(data) {
    const isAttack = data.prediction === 1;
    const resultEl = document.getElementById("result");

    resultEl.className = isAttack ? "attack" : "normal";
    document.getElementById("verdict").textContent =
      isAttack ? "🚨 DDoS Attack Detected!" : "✅ Normal Traffic";

    const confPct = (data.confidence * 100).toFixed(1);
    document.getElementById("detail").textContent =
      `Confidence: ${confPct}%  ·  Normal: ${(data.probabilities["Normal Traffic"] * 100).toFixed(1)}%  ·  DDoS: ${(data.probabilities["DDoS Attack"] * 100).toFixed(1)}%`;

    document.getElementById("bar-normal").style.width =
      (data.probabilities["Normal Traffic"] * 100) + "%";
    document.getElementById("bar-attack").style.width =
      (data.probabilities["DDoS Attack"] * 100) + "%";

    resultEl.style.display = "block";
    document.getElementById("error-msg").style.display = "none";
  }

  // ──────────────────────────────────────────────────────────────
  // Event listeners
  // ──────────────────────────────────────────────────────────────
  document.getElementById("btn-predict").addEventListener("click", predict);
  document.getElementById("btn-sample-ddos").addEventListener("click",
    () => setFields(SAMPLE_DDOS, "tcp"));
  document.getElementById("btn-sample-normal").addEventListener("click",
    () => setFields(SAMPLE_NORMAL, "tcp"));
  document.getElementById("btn-clear").addEventListener("click", clearFields);
</script>
</body>
</html>
